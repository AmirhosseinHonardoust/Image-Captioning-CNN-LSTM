[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "SIM", "UP"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.mypy]
python_version = "3.10"
files = ["src", "tests", "scripts"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = ["nltk.*", "torchvision.*", "pandas.*", "tqdm.*"]
ignore_missing_imports = true
